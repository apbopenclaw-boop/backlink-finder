name: Check Certificate Status
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Check certs
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl certs list --app backlink-finder
          echo "---bhrefs---"
          flyctl certs show bhrefs.com --app backlink-finder
          echo "---www---"
          flyctl certs show www.bhrefs.com --app backlink-finder
