app = 'backlink-finder'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 5
    soft_limit = 3

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2

[mounts]
  source = 'backlink_data'
  destination = '/data'
